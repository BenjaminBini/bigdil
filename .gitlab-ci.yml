stages:
  - check
  - build
  - deploy

variables:
  NODE_VERSION: "22"
  PNPM_VERSION: "10.33.2"
  IMAGE_PREFIX: "bigdil"
  IMAGE_TAG: "$CI_COMMIT_SHORT_SHA"
  DEPLOY_DIR: "/opt/infra/bigdil"

.node:
  image: node:${NODE_VERSION}-alpine
  cache:
    key:
      files:
        - pnpm-lock.yaml
    paths:
      - .pnpm-store/
    policy: pull-push
  before_script:
    - corepack enable
    - corepack prepare pnpm@${PNPM_VERSION} --activate
    - pnpm config set store-dir .pnpm-store
    - pnpm install --frozen-lockfile
    - pnpm --filter @bigdil/db build

typecheck:web:
  extends: .node
  stage: check
  script:
    - pnpm --filter web exec tsc -b --noEmit

typecheck:api:
  extends: .node
  stage: check
  script:
    - pnpm --filter @bigdil/api exec tsc --noEmit

build:web:
  extends: .node
  stage: build
  script:
    - pnpm --filter web build
  artifacts:
    name: "web-$CI_COMMIT_SHORT_SHA"
    paths:
      - packages/web/dist/
    expire_in: 1 week

build:api:
  extends: .node
  stage: build
  script:
    - pnpm --filter @bigdil/api build
  artifacts:
    name: "api-$CI_COMMIT_SHORT_SHA"
    paths:
      - packages/api/dist/
    expire_in: 1 week

deploy:
  stage: deploy
  image: docker:27
  services:
    - docker:27-dind
  variables:
    DOCKER_BUILDKIT: "1"
  environment:
    name: production/bigdil
    url: https://bigdil.beorn.tech
  rules:
    - if: $CI_COMMIT_BRANCH == "main"
  before_script:
    - apk add --no-cache openssh-client rsync
    - chmod 600 "$SSH_PRIVATE_KEY"
    # Report runner + vm arch so we can see when they mismatch
    - echo "runner arch:" && uname -m && docker version --format '{{.Server.Os}}/{{.Server.Arch}}'
    - echo "vm arch:" && ssh -i "$SSH_PRIVATE_KEY" -o UserKnownHostsFile="$SSH_KNOWN_HOSTS" "$DEPLOY_USER@$DEPLOY_HOST" "uname -m"
    # Register QEMU binfmt handlers so an arm64 runner can build amd64 images
    - docker run --privileged --rm tonistiigi/binfmt --install amd64
  script:
    # Build api + web images in the runner, pinned to amd64 to match the VM
    - docker build
        --platform linux/amd64
        -f packages/api/Dockerfile
        --tag "${IMAGE_PREFIX}-api:${IMAGE_TAG}"
        --tag "${IMAGE_PREFIX}-api:latest"
        .
    - docker build
        --platform linux/amd64
        -f packages/web/Dockerfile
        --tag "${IMAGE_PREFIX}-web:${IMAGE_TAG}"
        --tag "${IMAGE_PREFIX}-web:latest"
        .

    # Stream both images directly to the VM — no intermediate tarball on disk
    - docker save "${IMAGE_PREFIX}-api:${IMAGE_TAG}" "${IMAGE_PREFIX}-api:latest"
        | gzip
        | ssh -i "$SSH_PRIVATE_KEY" -o UserKnownHostsFile="$SSH_KNOWN_HOSTS" "$DEPLOY_USER@$DEPLOY_HOST" "gunzip | docker load"
    - docker save "${IMAGE_PREFIX}-web:${IMAGE_TAG}" "${IMAGE_PREFIX}-web:latest"
        | gzip
        | ssh -i "$SSH_PRIVATE_KEY" -o UserKnownHostsFile="$SSH_KNOWN_HOSTS" "$DEPLOY_USER@$DEPLOY_HOST" "gunzip | docker load"

    # Ship the prod compose file (rename to docker-compose.yml on the VM) + .env
    - rsync -az -e "ssh -i $SSH_PRIVATE_KEY -o UserKnownHostsFile=$SSH_KNOWN_HOSTS"
        docker-compose.prod.yml
        "$DEPLOY_USER@$DEPLOY_HOST:$DEPLOY_DIR/docker-compose.yml"
    - rsync -az -e "ssh -i $SSH_PRIVATE_KEY -o UserKnownHostsFile=$SSH_KNOWN_HOSTS"
        "$BIGDIL_ENV"
        "$DEPLOY_USER@$DEPLOY_HOST:$DEPLOY_DIR/.env"

    # Bring up the stack with the freshly loaded image tag
    - ssh -i "$SSH_PRIVATE_KEY" -o UserKnownHostsFile="$SSH_KNOWN_HOSTS" "$DEPLOY_USER@$DEPLOY_HOST"
        "cd $DEPLOY_DIR && IMAGE_TAG=$IMAGE_TAG docker compose up -d --remove-orphans && docker image prune -f"
