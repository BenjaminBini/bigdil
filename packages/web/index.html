<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/vite.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>web</title>
    <script>
      // Apply persisted theme before React mounts to avoid flash.
      (function () {
        try {
          var DARK_THEMES = { dark: 1, blue: 1, forest: 1 };
          var ALL = { light: 1, dark: 1, blue: 1, cappuccino: 1, forest: 1, rose: 1 };
          var stored = localStorage.getItem('bigdil-theme');
          if (stored === 'system') {
            stored = window.matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light';
          }
          if (!ALL[stored]) stored = 'light';
          document.documentElement.dataset.theme = stored;
          if (DARK_THEMES[stored]) document.documentElement.classList.add('dark');
        } catch (e) {}
      })();
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
