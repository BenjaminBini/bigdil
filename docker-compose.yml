services:
  db:
    image: postgres:17
    environment:
      POSTGRES_DB: bigdil
      POSTGRES_USER: bigdil
      POSTGRES_PASSWORD: bigdil
    ports:
      - "5433:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U bigdil"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - bigdil

  api:
    build:
      context: .
      dockerfile: packages/api/Dockerfile
    ports:
      - "3000:3000"
    environment:
      DATABASE_URL: postgresql://bigdil:bigdil@db:5432/bigdil
      PORT: "3000"
    depends_on:
      db:
        condition: service_healthy
    networks:
      - bigdil

  web:
    build:
      context: .
      dockerfile: packages/web/Dockerfile
    ports:
      - "5173:5173"
    environment:
      VITE_API_URL: http://localhost:3000
    depends_on:
      - api
    networks:
      - bigdil

networks:
  bigdil:
    driver: bridge

volumes:
  pgdata:
